name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      role_arn: ${{ steps.tf.outputs.role_arn }}

    env:
      AWS_REGION: us-east-1

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v3

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.4

      # Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Terraform Init
      - name: Terraform Init
        run: terraform init 

      # Terraform Format Check
      - name: Terraform Format
        run: terraform fmt 

      # Terraform Validate.
      - name: Terraform Validate
        run: terraform validate

      # Terraform Apply (optional for PRs)
      - name: Terraform Apply
        run: terraform apply --auto-approve

      - name: Get Terraform Output
        run: terraform output -json > tf_output.json

      - name: Output tf.json
        run: cat tf_output.json
         
      - name: Get Role ARN Output
        id: tf
        run: |
          echo "role_arn=$(terraform output -raw github_actions_role)" >> $GITHUB_OUTPUT
          
      - name: Debug Role ARN
        run: echo "Role ARN = ${{ steps.tf.outputs.role_arn }}"

  ansible_configuration:
    runs-on: ubuntu-latest
    needs: [terraform]
    permissions:
      id-token: write
      contents: read

    steps:
      # ----------------------------------
      # Checkout repo
      # ----------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
      # -------------------------------

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible and dependencies
        run: |
            python -m pip install --upgrade pip

      - name: Install Ansible and dependencies2
        run: |
            pip install ansible boto3 botocore 

      - name: Install amazon.aws collection
        run: |
            ansible-galaxy collection install amazon.aws

 

      - name: test aws ec2 plugin
        run: ansible-doc -t inventory amazon.aws.aws_ec2

      - name: Output inventory graph
        run: ansible-inventory -i aws_ec2.yml --graph

      - name: Debug role ARN
        run: echo "Role ARN = ${{ needs.terraform.outputs.role_arn }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
         role-to-assume: ${{ needs.terraform.outputs.role_arn }}
         aws-region: us-east-1

      - name: run ansible playbook
        run: ansible-playbook -i aws_ec2.yml ping.yml -vvv