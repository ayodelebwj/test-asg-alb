---
- name: Test connectivity to all hosts
  hosts: all
  remote_user: ubuntu
  gather_facts: yes

  tasks:
    - name: Create home directory if missing
      ansible.builtin.file:
        path: /home/ubuntu
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Raw echo test
      ansible.builtin.raw: echo "OK"
