plugin: amazon.aws.aws_ec2

regions:
  - us-east-1

filters:
  instance-state-name: running

keyed_groups:
  - key: tags.Role
    prefix: role

hostnames:
  - instance-id

compose:
  ansible_connection: aws_ssm
  ansible_region: region
  ansible_connection: community.aws.aws_ssm
  ansible_user: ubuntu
  ansible_aws_ssm_region: us-east-1