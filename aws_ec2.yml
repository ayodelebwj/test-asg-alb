plugin: amazon.aws.aws_ec2

regions:
  - us-east-1

filters:
  instance-state-name: running
  tag:aws:autoscaling:frontend_asg: frontend-asg
  tag:aws:autoscaling:backend_asg: backend_asg


keyed_groups:
  - key: tags.Role
    prefix: role

hostnames:
  - instance-id

compose:
  ansible_connection: "'aws_ssm'"
  ansible_user: "'ubuntu'"
  ansible_python_interpreter: "'/usr/bin/python3'"
  ansible_aws_ssm_region: "'us-east-1'"

